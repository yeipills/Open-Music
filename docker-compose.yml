# docker-compose.yml - Configuración optimizada Open Music Bot

services:
  # Proveedor de PO Tokens (BotGuard) para evitar el bloqueo anti-bot de YouTube.
  # El bot lo consulta por nombre de servicio en la red interna del compose.
  # Puerto 4416 NO expuesto al host: solo accesible dentro de esta red.
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: open-music-potprovider
    restart: unless-stopped
    expose:
      - "4416"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  open-music:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-music-bot
    restart: unless-stopped
    depends_on:
      - bgutil-provider

    # Recursos limitados para optimización
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    environment:
      # Discord
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - APPLICATION_ID=${APPLICATION_ID}
      - GUILD_ID=${GUILD_ID:-}

      # Audio
      - DEFAULT_VOLUME=0.5
      - OPUS_BITRATE=128000
      - FRAME_SIZE=960
      - MAX_SONG_DURATION=7200

      # Performance
      - CACHE_SIZE=100
      - AUDIO_CACHE_SIZE=50
      - MAX_QUEUE_SIZE=1000
      - WORKER_THREADS=2
      - MAX_PLAYLIST_SIZE=100

      # Features
      - ENABLE_EQUALIZER=true
      - ENABLE_AUTOPLAY=false

      # Sistema
      - RUST_LOG=info,open_music=debug
      - RUST_BACKTRACE=1

    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./config:/app/config
      - ./config:/home/openmusic/.config/yt-dlp

    # Métricas (opcional). Bindeado a localhost en 8095 para no chocar con
    # otros servicios del host que ya usan 8080.
    ports:
      - "127.0.0.1:8095:8080"

    # Health check
    healthcheck:
      test: [ "CMD", "pgrep", "open-music" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Seguridad
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=10M

    # Logging optimizado
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

# Volúmenes con configuración específica
volumes:
  data:
    driver: local
  cache:
    driver: local
